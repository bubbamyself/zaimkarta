name: zaimkarta-prod

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - production.env.server
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ../site
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - production.env.server
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - logo_uploads:/app/public/uploads/logos
    networks:
      - proxy_net
      - db_net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy_net

volumes:
  postgres_data:
  logo_uploads:
  caddy_data:
  caddy_config:

networks:
  proxy_net:
  db_net:
    internal: true
