services:
  postgres:
    image: postgres:17-alpine
    container_name: zaimkarta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zaimkarta
      POSTGRES_USER: zaimkarta
      POSTGRES_PASSWORD: zaimkarta_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zaimkarta -d zaimkarta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
